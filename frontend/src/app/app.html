<app-toast />
@if (isLoginPage()) {
  <router-outlet />
} @else {
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">🏛</div>
        <div class="brand-name">Trámites Digitales</div>
        <div class="brand-sub">Sistema Municipal</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a routerLink="/dashboard" routerLinkActive="active">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a routerLink="/tramites" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span class="nav-icon">📋</span> Trámites
        </a>
        <a routerLink="/tramites/nuevo" routerLinkActive="active">
          <span class="nav-icon">➕</span> Nuevo Trámite
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div>
            <div class="user-name">Admin</div>
            <div class="user-role">Administrador</div>
          </div>
        </div>
        <button (click)="toggleDark()">
          <span class="nav-icon">{{ darkMode() ? '☀️' : '🌙' }}</span>
          {{ darkMode() ? 'Modo claro' : 'Modo oscuro' }}
        </button>
        <button (click)="logout()">
          <span class="nav-icon">🚪</span> Cerrar sesión
        </button>
      </div>
    </aside>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
}
